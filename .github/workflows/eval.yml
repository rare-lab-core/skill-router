name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  battery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Zero dependencies, so there is nothing to install.
      - name: Run the skill-matcher battery
        run: node bin/eval.mjs
